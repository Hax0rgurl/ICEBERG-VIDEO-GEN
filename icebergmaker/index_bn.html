  <div class="language-selector">
    <button class="language-menu-btn">

        <span></span>

    <div class="language-list">

  <div class="overlay"></div>
  <div class="container">
    <h1>আইসবার্গ মেকার</h1>
    <p>আপনার আইসবার্গ চার্ট কাস্টমাইজ করুন:</p>
    <div class="controls">
      <div class="topic-selector">
        <label>বিষয়ের ধরন:</label>
        <select id="topicType">
          <option value="custom">কাস্টম</option>
          <option value="mystery">রহস্য</option>
          <option value="danger">বিপদ</option>
        </select>
      </div>
      <div class="level-selector">
        <label>স্তরের সংখ্যা:</label>
        <input type="number" id="levelCount" min="3" value="5">
      </div>
      <div class="option-selector">
        <label>
          <input type="checkbox" id="noImagesToggle"> ছবি ছাড়া (দ্রুত)
        </label>
      </div>
    </div>
    <div class="button-group">
      <input type="text" id="categoryInput" placeholder="আপনার বিষয় লিখুন...">
      <button id="generateBtn" class="action-button">তৈরি করুন</button>
      <button id="downloadBtn" class="action-button">সব ডাউনলোড করুন</button>
      <button id="tipBtn" class="action-button">🪙 বকশিস</button>
      <a href="instructions.html" class="action-button">ℹ️ নির্দেশাবলী</a>
    </div>
    <div id="tipsContainer" class="tips-container"></div>
    <div id="progressBarContainer" class="progress-bar">
      <div id="progressBar" class="progress"></div>
    </div>
    <div id="icebergChart" class="iceberg-chart"></div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.6.0/jszip.min.js"></script>
  <script type="module" src="scripts.js"></script>
  <script type="importmap">
  {
    "imports": {
      "jszip": "https://cdn.jsdelivr.net/npm/jszip@3.10.1/+esm"
    }
  }
  </script>
